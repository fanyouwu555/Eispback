server:
  port: 8080
  tomcat:
    uri-encoding: UTF-8
    max-swallow-size: 500MB
    connection-timeout: 120000
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: aeisp-server
  datasource:
    url: jdbc:postgresql://localhost:5432/aeisp
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.aeisp.**.entity

jwt:
  secret: YWVpc3AtZGVmYXVsdC1zZWNyZXQta2V5LTI1Ni1iaXQtc3RyaW5nLWFlaXNwLXNlcnZlcg==
  access-expiration: 7200000      # 2小时
  refresh-expiration: 604800000   # 7天

template:
  upload-path: ./uploads/templates/

resource-server:
  type: nfs    # nfs or oss
  nfs:
    upload-path: D:/Users/admin/Desktop/EISP/Resource/Template/     # HFS 文件服务路径
    base-url: http://192.168.50.215/EISP/Resource/Template/
  users:
    upload-path: D:/Users/admin/Desktop/EISP/Users/
    base-url: http://192.168.50.215/EISP/Users/
  notification:
    upload-path: D:/Users/admin/Desktop/EISP/Notification/
    base-url: http://192.168.50.215/EISP/Notification/

logging:
  level:
    com.aeisp: debug
