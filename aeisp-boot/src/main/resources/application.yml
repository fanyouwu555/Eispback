server:
  port: 8080
  tomcat:
    uri-encoding: UTF-8

spring:
  application:
    name: aeisp-server
  datasource:
    url: jdbc:postgresql://localhost:5432/aeisp
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.aeisp.**.entity

jwt:
  secret: YWVpc3AtZGVmYXVsdC1zZWNyZXQta2V5LTI1Ni1iaXQtc3RyaW5nLWFlaXNwLXNlcnZlcg==
  access-expiration: 7200000      # 2小时
  refresh-expiration: 604800000   # 7天

logging:
  level:
    com.aeisp: debug
